<!-- 分类管理 -->
<div class="page-header">
    <div class="page-title">
        <h2>🏷️ 分类管理</h2>
        <p class="page-subtitle">管理产品和文章的分类标签</p>
    </div>
    <div class="page-actions">
        <button class="btn btn-primary" id="btnAddCategory">+ 添加分类</button>
    </div>
</div>

<div class="cat-table-wrap" id="catWrap">
    <div class="empty-state" id="catEmpty" style="display:none;">
        <div class="placeholder-icon">🏷️</div>
        <h3>暂无分类</h3>
        <p>请先在产品或文章中添加分类</p>
    </div>
</div>

<!-- 重命名弹窗 -->
<div class="modal-overlay" id="catRenameModal" style="display:none;">
    <div class="modal" style="width:400px;">
        <div class="modal-header">
            <h3>重命名分类</h3>
            <button class="btn-icon modal-close" id="catRenameClose">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>原名称</label>
                <input type="text" id="catOldName" class="form-input" readonly>
            </div>
            <div class="form-group">
                <label>新名称 <span class="required">*</span></label>
                <input type="text" id="catNewName" class="form-input" placeholder="输入新分类名称">
                <span class="form-hint">所有使用此分类的产品和文章将同步更新</span>
            </div>
            <div class="form-group" id="catRenamePreview" style="color:var(--text-secondary);font-size:12px;"></div>
        </div>
        <div class="modal-footer">
            <span class="form-error" id="catRenameError"></span>
            <button class="btn btn-secondary" id="catRenameCancel">取消</button>
            <button class="btn btn-primary" id="catRenameConfirm">确认重命名</button>
        </div>
    </div>
</div>

<!-- 添加分类弹窗 -->
<div class="modal-overlay" id="catAddModal" style="display:none;">
    <div class="modal" style="width:500px;">
        <div class="modal-header">
            <h3>添加分类</h3>
            <button class="btn-icon modal-close" id="catAddClose">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>分类 ID（英文标识） <span class="required">*</span></label>
                <input type="text" id="catAddKey" class="form-input" placeholder="例如：drill、saw">
                <span class="form-hint">唯一标识，用于 YAML 键名</span>
            </div>
            <div class="form-row">
                <div class="form-group flex-1">
                    <label>显示名称 <span class="required">*</span></label>
                    <input type="text" id="catAddName" class="form-input" placeholder="例如：DRILL">
                </div>
                <div class="form-group flex-1">
                    <label>Slug</label>
                    <input type="text" id="catAddSlug" class="form-input" placeholder="默认同 ID">
                </div>
            </div>
            <div class="form-group">
                <label>中文标题 <span class="required">*</span></label>
                <input type="text" id="catAddTitle" class="form-input" placeholder="例如：无绳电钻">
            </div>
            <div class="form-group">
                <label>描述</label>
                <input type="text" id="catAddDesc" class="form-input" placeholder="例如：12V & 18V cordless drills">
            </div>
            <div class="form-group">
                <label>封面图路径</label>
                <input type="text" id="catAddImage" class="form-input" placeholder="例如：/images/cordless-drills.jpg">
                <span class="form-hint">存放于仓库 /images/ 目录下的图片路径，不填则显示默认占位</span>
            </div>
            <div class="form-group">
                <label>排序</label>
                <input type="number" id="catAddOrder" class="form-input" value="99" style="width:100px;">
                <span class="form-hint">数字越小越靠前</span>
            </div>
        </div>
        <div class="modal-footer">
            <span class="form-error" id="catAddError"></span>
            <button class="btn btn-secondary" id="catAddCancel">取消</button>
            <button class="btn btn-primary" id="catAddConfirm">确认添加</button>
        </div>
    </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="catDeleteModal" style="display:none;">
    <div class="modal" style="width:420px;">
        <div class="modal-header">
            <h3>删除分类</h3>
            <button class="btn-icon modal-close" id="catDeleteClose">✕</button>
        </div>
        <div class="modal-body" id="catDeleteBody">
            <p>确定要删除此分类吗？</p>
        </div>
        <div class="modal-footer">
            <span class="form-error" id="catDeleteError"></span>
            <button class="btn btn-secondary" id="catDeleteCancel">取消</button>
            <button class="btn btn-danger" id="catDeleteConfirm">确认删除</button>
        </div>
    </div>
</div>

<!-- 编辑分类弹窗 -->
<div class="modal-overlay" id="catEditModal" style="display:none;">
    <div class="modal" style="width:500px;">
        <div class="modal-header">
            <h3>编辑分类</h3>
            <button class="btn-icon modal-close" id="catEditClose">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>分类 ID（只读）</label>
                <input type="text" id="catEditKey" class="form-input" readonly>
            </div>
            <div class="form-row">
                <div class="form-group flex-1">
                    <label>显示名称 <span class="required">*</span></label>
                    <input type="text" id="catEditName" class="form-input">
                </div>
                <div class="form-group flex-1">
                    <label>Slug</label>
                    <input type="text" id="catEditSlug" class="form-input">
                </div>
            </div>
            <div class="form-group">
                <label>中文标题 <span class="required">*</span></label>
                <input type="text" id="catEditTitle" class="form-input">
            </div>
            <div class="form-group">
                <label>描述</label>
                <input type="text" id="catEditDesc" class="form-input">
            </div>
            <div class="form-group">
                <label>封面图路径</label>
                <input type="text" id="catEditImage" class="form-input" placeholder="例如：/images/cordless-drills.jpg">
                <span class="form-hint">存放于仓库 /images/ 目录下的图片路径</span>
            </div>
            <div class="form-group">
                <label>排序</label>
                <input type="number" id="catEditOrder" class="form-input" style="width:100px;">
                <span class="form-hint">数字越小越靠前</span>
            </div>
        </div>
        <div class="modal-footer">
            <span class="form-error" id="catEditError"></span>
            <button class="btn btn-secondary" id="catEditCancel">取消</button>
            <button class="btn btn-primary" id="catEditConfirm">确认保存</button>
        </div>
    </div>
</div>
