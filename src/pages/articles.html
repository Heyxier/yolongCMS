<!-- 文章管理 -->
<div class="page-header">
    <div class="page-title">
        <h2>📝 文章管理</h2>
        <p class="page-subtitle" id="articlesSubtitle">管理所有新闻与文章</p>
    </div>
    <div class="page-actions">
        <button class="btn btn-primary" id="btnAddArticle">+ 添加文章</button>
    </div>
</div>

<!-- 筛选栏 -->
<div class="product-filters">
    <div class="filter-group">
        <label>分类</label>
        <select class="filter-select" id="artFilterCategory">
            <option value="">全部</option>
        </select>
    </div>
    <div class="filter-group">
        <label>状态</label>
        <select class="filter-select" id="artFilterStatus">
            <option value="">全部</option>
            <option value="true">已发布</option>
            <option value="false">草稿</option>
        </select>
    </div>
    <div class="filter-group filter-search">
        <input type="text" class="filter-select" id="artFilterSearch" placeholder="🔍 搜索文章标题...">
    </div>
    <div class="log-stats" id="articleStats">共 0 篇文章</div>
</div>

<!-- 文章列表 -->
<div class="article-list" id="articleList"></div>

<!-- 空状态 -->
<div class="empty-state" id="articleEmpty" style="display:none;">
    <div class="placeholder-icon">📝</div>
    <h3>暂无文章</h3>
    <p>点击"添加文章"开始管理新闻动态</p>
</div>

<!-- ===== 文章编辑弹窗 ===== -->
<div class="modal-overlay" id="articleModal" style="display:none;">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h3 id="modalArticleTitle">添加文章</h3>
            <button class="btn-icon modal-close" id="modalArticleClose">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group flex-1">
                    <label>文章标题 <span class="required">*</span></label>
                    <input type="text" id="afTitle" placeholder="例如：Yolongtec 荣获年度最佳..." class="form-input">
                </div>
                <div class="form-group flex-1">
                    <label>分类 <span class="required">*</span></label>
                    <input type="text" id="afCategory" placeholder="例如：news" class="form-input">
                </div>
                <div class="form-group" style="flex:0 0 160px;">
                    <label>发布到</label>
                    <select id="afPlacement" class="form-input">
                        <option value="news">📰 News</option>
                        <option value="technology">🔧 Technology</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group flex-1">
                    <label>发布日期</label>
                    <input type="date" id="afPublishedAt" class="form-input">
                </div>
                <div class="form-group flex-1">
                    <label>状态</label>
                    <div class="toggle-wrap">
                        <label class="toggle-label">
                            <input type="checkbox" id="afStatus" checked>
                            <span class="toggle-slider"></span>
                        </label>
                        <span id="afStatusText">已发布</span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>封面图片路径</label>
                <input type="text" id="afCoverImage" placeholder="/images/construction-site.jpg" class="form-input">
            </div>
            <div class="form-group">
                <label>摘要 <span class="form-hint">（文章列表页显示的简短描述）</span></label>
                <textarea id="afExcerpt" class="form-textarea" rows="3" placeholder="文章的简短摘要..."></textarea>
            </div>
            <div class="form-group">
                <label>标签 <span class="form-hint">（每行一条）</span></label>
                <textarea id="afTags" class="form-textarea" rows="3" placeholder="例如：&#10;品牌新闻&#10;行业荣誉"></textarea>
            </div>
            <div class="form-group">
                <label>正文内容</label>
                <div class="rich-editor">
                    <div class="rich-toolbar" id="richToolbar">
                        <!-- 文本格式 -->
                        <button type="button" class="rich-btn" data-cmd="bold" title="加粗 Ctrl+B"><b>B</b></button>
                        <button type="button" class="rich-btn" data-cmd="italic" title="斜体 Ctrl+I"><i>I</i></button>
                        <button type="button" class="rich-btn" data-cmd="underline" title="下划线 Ctrl+U"><u>U</u></button>
                        <span class="rich-divider"></span>

                        <!-- 标题 -->
                        <select class="rich-select" id="richHeadingSelect" title="标题格式">
                            <option value="">标题…</option>
                            <option value="h1">H1 标题 1</option>
                            <option value="h2">H2 标题 2</option>
                            <option value="h3">H3 标题 3</option>
                            <option value="p">正文</option>
                        </select>
                        <span class="rich-divider"></span>

                        <!-- 列表 & 引用 -->
                        <button type="button" class="rich-btn" data-cmd="insertUnorderedList" title="无序列表">☰</button>
                        <button type="button" class="rich-btn" data-cmd="insertOrderedList" title="有序列表">1.</button>
                        <button type="button" class="rich-btn" data-cmd="blockquote" title="引用">❝</button>
                        <span class="rich-divider"></span>

                        <!-- 对齐 -->
                        <button type="button" class="rich-btn" data-cmd="justifyLeft" title="左对齐">◀</button>
                        <button type="button" class="rich-btn" data-cmd="justifyCenter" title="居中">⬌</button>
                        <button type="button" class="rich-btn" data-cmd="justifyRight" title="右对齐">▶</button>
                        <span class="rich-divider"></span>

                        <!-- 插入 -->
                        <button type="button" class="rich-btn" data-cmd="link" title="插入链接">🔗</button>
                        <button type="button" class="rich-btn" data-cmd="image" title="插入图片">🖼️</button>
                        <button type="button" class="rich-btn" data-cmd="hr" title="分割线">—</button>
                        <span class="rich-divider"></span>

                        <!-- 工具 -->
                        <button type="button" class="rich-btn" data-cmd="removeFormat" title="清除格式">🧹</button>
                        <span class="rich-divider"></span>
                        <button type="button" class="rich-btn" data-cmd="source" title="源码" id="btnRichSource">&lt;/&gt;</button>
                    </div>
                    <div class="rich-content" id="richContent" contenteditable="true"></div>
                    <textarea id="afBody" class="rich-source" style="display:none;" rows="10"></textarea>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <span class="form-error" id="afError"></span>
            <button class="btn btn-secondary" id="modalArticleCancel">取消</button>
            <button class="btn btn-primary" id="modalArticleSave">保存</button>
        </div>
    </div>
</div>

<!-- ===== 图片选择弹窗 ===== -->
<div class="modal-overlay" id="imagePickerModal" style="display:none;">
    <div class="modal modal-lg" style="max-width:600px;">
        <div class="modal-header">
            <h3>🖼️ 选择图片</h3>
            <button class="btn-icon modal-close" id="pickerModalClose">✕</button>
        </div>
        <div class="modal-body">
            <div class="picker-nav" id="pickerNav">
                <span class="picker-nav-root">📁 images/</span>
            </div>
            <div class="picker-image-grid" id="pickerImageList"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="pickerModalCancel">取消</button>
            <button class="btn btn-primary" id="pickerModalSelect">插入选中图片</button>
        </div>
    </div>
</div>
