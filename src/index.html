<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
    <title>YolongCMS</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- 顶部标题栏 -->
    <header class="topbar">
        <div class="topbar-left">
            <span class="topbar-brand">YolongCMS</span>
            <span class="topbar-divider"></span>
            <span class="topbar-site" id="currentSite">未选择站点</span>
        </div>
        <div class="topbar-right">
            <span class="server-status" id="serverStatus">
                <span class="status-dot offline"></span>
                <span class="status-text">服务器离线</span>
            </span>
            <button class="btn-icon" id="btnSettings" title="设置">⚙️</button>
        </div>
    </header>

    <!-- 主体 -->
    <div class="layout">
        <!-- 左侧导航 -->
        <nav class="sidebar" id="sidebar">
            <ul class="nav-list">
                <li class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">仪表盘</span>
                </li>
                <li class="nav-item" data-page="products">
                    <span class="nav-icon">📦</span>
                    <span class="nav-label">产品</span>
                </li>
                <li class="nav-item" data-page="articles">
                    <span class="nav-icon">📝</span>
                    <span class="nav-label">文章</span>
                </li>
                <li class="nav-item" data-page="categories">
                    <span class="nav-icon">🏷️</span>
                    <span class="nav-label">分类</span>
                </li>
                <li class="nav-item" data-page="images">
                    <span class="nav-icon">🖼️</span>
                    <span class="nav-label">图片</span>
                </li>
                <li class="nav-item" data-page="messages">
                    <span class="nav-icon">✉️</span>
                    <span class="nav-label">留言</span>
                </li>
                <li class="nav-item" data-page="publish">
                    <span class="nav-icon">🚀</span>
                    <span class="nav-label">发布</span>
                </li>
            </ul>

            <!-- 底部站点管理 -->
            <div class="sidebar-footer">
                <button class="nav-item footer-btn" id="btnSites" data-page="sites">
                    <span class="nav-icon">📁</span>
                    <span class="nav-label">站点管理</span>
                </button>
            </div>
        </nav>

        <!-- 右侧内容区 -->
        <main class="content" id="content">
            <div class="page-placeholder">
                <div class="placeholder-icon">📊</div>
                <h2>仪表盘</h2>
                <p>选择左侧菜单开始管理</p>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/sites.js"></script>
</body>
</html>
